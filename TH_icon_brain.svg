<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Therapeutic Hypothermia — Miri Hospital NICU</title>
<desc>A stylised medical icon showing a human brain overlaid with a cooling snowflake, representing neonatal therapeutic hypothermia. Deep navy background with icy blue tones.</desc>

<style>
  .bg { fill: #0f2744; }
  .brain-main { fill: #1a4a7a; }
  .brain-mid  { fill: #2563a8; }
  .brain-hi   { fill: #3b82c4; }
  .brain-fold { fill: none; stroke: #5ba3d9; stroke-width: 2.5; stroke-linecap: round; }
  .brain-fold-lt { fill: none; stroke: #9ecbee; stroke-width: 1.5; stroke-linecap: round; }
  .sulcus     { fill: none; stroke: #0f2744; stroke-width: 3; stroke-linecap: round; }
  .snowflake  { stroke: #e8f4ff; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .sf-arm     { stroke-width: 3.5; }
  .sf-branch  { stroke-width: 2; }
  .sf-dot     { fill: #e8f4ff; }
  .glow-ring  { fill: none; stroke: #93c5fd; stroke-width: 1; opacity: 0.35; }
  .stem       { fill: #1a4a7a; stroke: #2563a8; stroke-width: 1.5; }
  .ice-dot    { fill: #bfdbfe; opacity: 0.6; }
  .lbl-title  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 22px; font-weight: 700; fill: #e8f4ff; }
  .lbl-sub    { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 400; fill: #7db8e8; }
  .temp-text  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; font-weight: 700; fill: #93c5fd; }
</style>

